<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Gözcü - Canlı Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bot-card { transition: transform 0.2s, box-shadow 0.2s; }
        .bot-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        /* Modal Background Blur */
        .modal-bg { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Üst Menü / Navbar -->
    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-eye text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-white">KNIGHT GÖZCÜ</h1>
                    <p class="text-xs text-slate-400" id="panelOwnerText">Yükleniyor...</p>
                </div>
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <div class="hidden md:flex items-center gap-4 mr-4 text-sm font-medium">
                    <div class="flex items-center gap-2 text-green-400"><i class="fa-solid fa-circle text-[10px]"></i> <span id="onlineCount">0</span> Online</div>
                    <div class="flex items-center gap-2 text-red-400"><i class="fa-solid fa-triangle-exclamation text-[10px]"></i> <span id="errorCount">0</span> Sorunlu</div>
                </div>
                
                <div class="relative hidden sm:block">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Bot Ara..." class="bg-slate-800 border border-slate-700 text-sm rounded-lg pl-9 pr-3 py-1.5 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 w-48 text-slate-200 transition-all placeholder-slate-500">
                </div>

                <button onclick="openSettingsModal()" class="w-9 h-9 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 flex items-center justify-center text-slate-300 transition-colors" title="Panel ve Discord Ayarları">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Ana İçerik -->
    <main class="flex-grow p-4 md:p-6 max-w-7xl mx-auto w-full">
        <!-- Filtreler -->
        <div class="flex flex-wrap gap-3 mb-6 bg-slate-900/50 p-3 rounded-xl border border-slate-800/50">
            <select id="statusFilter" class="bg-slate-800 border border-slate-700 text-sm rounded-lg px-3 py-2 text-slate-300 focus:outline-none focus:border-indigo-500">
                <option value="ALL">Tüm Durumlar</option>
                <option value="ONLINE">Sadece Online</option>
                <option value="ERROR">Hata Verenler</option>
                <option value="JAIL">Hapis / Karaliste</option>
                <option value="OFFLINE">Kapalı Olanlar</option>
            </select>
            
            <button onclick="forceRestartAll()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-2 shadow-lg shadow-indigo-900/20">
                <i class="fa-solid fa-bolt"></i> Tümünü Zorla Başlat
            </button>
        </div>

        <!-- Bot Grid -->
        <div id="botsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5">
            <!-- Bot Kartları Buraya JS ile Gelecek -->
            <div class="col-span-full text-center py-12 text-slate-500">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-indigo-500"></i>
                <p>Firebase sunucusuna bağlanılıyor, botlar aranıyor...</p>
            </div>
        </div>
    </main>

    <!-- AYARLAR MODALI (Discord Webhook vs.) -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 modal-bg z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="settingsModalContent">
            <div class="bg-slate-800/80 px-5 py-4 border-b border-slate-700 flex justify-between items-center">
                <h3 class="font-bold text-white flex items-center gap-2"><i class="fa-brands fa-discord text-indigo-400"></i> Panel & Discord Ayarları</h3>
                <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Discord Webhook URL</label>
                    <input type="text" id="discordWebhookInput" placeholder="https://discord.com/api/webhooks/..." class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    <p class="text-[11px] text-slate-500 mt-1">Botlar düştüğünde "Ölüm Sebebi" bu adrese bildirim olarak gönderilir.</p>
                </div>
                
                <label class="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg border border-slate-700 cursor-pointer hover:bg-slate-800 transition-colors">
                    <input type="checkbox" id="enableDiscordAlerts" class="w-4 h-4 text-indigo-600 rounded bg-slate-900 border-slate-600 focus:ring-indigo-600 focus:ring-2">
                    <div>
                        <div class="text-sm font-medium text-slate-200">Bildirimleri Bu Cihazdan Gönder</div>
                        <div class="text-[11px] text-slate-500">Spam olmaması için sadece ana PC/Telefonunuzda açın.</div>
                    </div>
                </label>
            </div>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50 flex justify-end gap-3">
                <button onclick="closeSettingsModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">İptal</button>
                <button onclick="saveSettings()" class="px-4 py-2 rounded-lg text-sm font-medium bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg transition-colors">Ayarları Kaydet</button>
            </div>
        </div>
    </div>

    <!-- KOMUT MODALI -->
    <div id="commandModal" class="fixed inset-0 bg-black/60 modal-bg z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-95 transition-transform duration-300" id="commandModalContent">
            <div class="bg-slate-800/80 px-5 py-4 border-b border-slate-700 flex justify-between items-center">
                <h3 class="font-bold text-white flex items-center gap-2"><i class="fa-solid fa-terminal text-indigo-400"></i> Bot Kontrol Merkezi</h3>
                <button onclick="closeCommandModal()" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            
            <div class="p-5">
                <p class="text-sm text-slate-300 mb-4 text-center">Seçili Bot: <strong id="cmdBotName" class="text-white bg-slate-800 px-2 py-0.5 rounded"></strong></p>
                
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="sendCommand('START_GAME')" class="bg-green-600/20 hover:bg-green-600/30 text-green-400 border border-green-600/30 hover:border-green-500 py-2.5 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play"></i> Zorla Başlat (Engelleri Sıfırla)
                    </button>
                    
                    <button onclick="sendCommand('KILL_GAME')" class="bg-red-600/20 hover:bg-red-600/30 text-red-400 border border-red-600/30 hover:border-red-500 py-2.5 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-skull"></i> Acil Kapat (Sistemi Kilitle)
                    </button>
                    
                    <button onclick="sendCommand('RESTART_BOT')" class="bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-600/30 hover:border-blue-500 py-2.5 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-rotate"></i> Gözcü Botu Yeniden Başlat
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bildirim Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <i id="toastIcon" class="fa-solid fa-circle-check text-green-400 text-xl"></i>
        <div>
            <h4 id="toastTitle" class="font-bold text-sm leading-tight">Başarılı</h4>
            <p id="toastMessage" class="text-xs text-slate-400">İşlem tamamlandı.</p>
        </div>
    </div>

    <!-- Firebase kütüphaneleri -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // URL'den anahtarı (MusteriID) alma
        const urlParams = new URLSearchParams(window.location.search);
        const musteriID = urlParams.get('anahtar');

        if (!musteriID) {
            document.getElementById('botsGrid').innerHTML = `
                <div class="col-span-full text-center py-12">
                    <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">Erişim Reddedildi</h2>
                    <p class="text-slate-400">Lütfen URL'nin sonuna ?anahtar=SİZİN_KİMLİĞİNİZ ekleyerek giriniz.</p>
                </div>`;
            throw new Error("Anahtar eksik.");
        }

        document.getElementById('panelOwnerText').textContent = "Lisans: " + musteriID.toUpperCase();

        // Firebase Yapılandırması (Kendi projene göre güncellemana gerek yok, bu sabit veri istasyonu)
        const firebaseConfig = {
            databaseURL: "https://gozcu-panel-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global Değişkenler
        let allBotsData = {};
        let previousBotsState = {}; // Discord Webhook için önceki durumları tutar
        let selectedBotIdForCommand = "";

        // Discord Ayarlarını Yükle
        const savedWebhook = localStorage.getItem('discordWebhookUrl');
        const savedAlertsEnabled = localStorage.getItem('enableDiscordAlerts') === 'true';
        if(savedWebhook) document.getElementById('discordWebhookInput').value = savedWebhook;
        document.getElementById('enableDiscordAlerts').checked = savedAlertsEnabled;

        // Renk ve İkon Haritaları
        const colorMap = {
            "green": "#4ade80", "red": "#f87171", "yellow": "#facc15", 
            "purple": "#c084fc", "blue": "#60a5fa", "gray": "#94a3b8", "black": "#475569"
        };
        const iconMap = {
            "ONLINE": "fa-gamepad", "OFFLINE": "fa-plug-circle-xmark",
            "QUEUE": "fa-hourglass-half", "LAUNCHER": "fa-rocket",
            "JAIL": "fa-gavel", "BLACKLIST": "fa-ban", "OTP_ERROR": "fa-shield-halved",
            "NPC_ERROR": "fa-street-view", "TIME_ERROR": "fa-clock", "RESTARTING": "fa-skull-crossbones"
        };

        // Firebase Dinleyicisi
        const botsRef = ref(db, `Bots/${musteriID}`);
        onValue(botsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Discord Webhook Kontrolü (Sadece eğer bu cihazdan izin verildiyse)
                if (localStorage.getItem('enableDiscordAlerts') === 'true') {
                    checkForDiscordAlerts(data);
                }
                
                allBotsData = data;
                previousBotsState = JSON.parse(JSON.stringify(data)); // Derin kopya
                renderBots();
            } else {
                document.getElementById('botsGrid').innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-500">
                        <i class="fa-solid fa-ghost text-4xl mb-3 opacity-50"></i>
                        <p>Henüz aktif bot bulunamadı. Gözcü programı veri gönderdiğinde burada belirecektir.</p>
                    </div>`;
            }
        });

        // ----------------------------------------------------
        // DİSCORD WEBHOOK SİSTEMİ (v4.15 Uyumlu)
        // ----------------------------------------------------
        function checkForDiscordAlerts(newData) {
            const webhookUrl = localStorage.getItem('discordWebhookUrl');
            if (!webhookUrl || !webhookUrl.startsWith("http")) return;

            Object.keys(newData).forEach(botKey => {
                const newBot = newData[botKey];
                const oldBot = previousBotsState[botKey];

                // Eğer bot yeni eklendiyse es geç (ilk açılışta spam atmaması için)
                if (!oldBot) return;

                // Eğer botun durumu yeni güncellendiyse ve "RESTARTING" (Ölüm/Kapanma) durumuna geçtiyse
                if (newBot.LastUpdate !== oldBot.LastUpdate) {
                    if (newBot.StatusCode === "RESTARTING" && oldBot.StatusCode !== "RESTARTING") {
                        sendDiscordWebhook(webhookUrl, newBot);
                    }
                }
            });
        }

        function sendDiscordWebhook(url, bot) {
            const payload = {
                username: "Gözcü Rapor Merkezi",
                avatar_url: "https://cdn-icons-png.flaticon.com/512/3204/3204052.png",
                embeds: [{
                    title: `🚨 OYUN KAPATILDI / DÜŞTÜ`,
                    color: 15158332, // Kırmızı
                    description: `**Hesap:** \`${bot.Account || 'Bilinmiyor'}\`\n**Sunucu:** \`${bot.Server || 'Bilinmiyor'}\`\n**Makine:** \`${bot.MachineName || 'PC'}\``,
                    fields: [
                        {
                            name: "Ölüm Sebebi & Rapor",
                            value: `\`\`\`diff\n- ${bot.StatusMsg || "Bilinmeyen bir hata nedeniyle kapandı."}\n\`\`\``
                        }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.log("Discord Webhook Hatası:", err));
        }
        // ----------------------------------------------------

        // Arama ve Filtre Dinleyicileri
        document.getElementById('searchInput').addEventListener('input', renderBots);
        document.getElementById('statusFilter').addEventListener('change', renderBots);

        // Tarih Çözümleyici (01.01.2024 15:30:00 formatı için)
        function parseCustomDate(dateStr) {
            if (!dateStr) return new Date(0);
            try {
                const parts = dateStr.split(' ');
                const dateParts = parts[0].split('.');
                const timeParts = parts[1].split(':');
                return new Date(dateParts[2], dateParts[1] - 1, dateParts[0], timeParts[0], timeParts[1], timeParts[2]);
            } catch { return new Date(0); }
        }

        // Render Metodu
        function renderBots() {
            const grid = document.getElementById('botsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterValue = document.getElementById('statusFilter').value; 
            
            grid.innerHTML = ""; 
            
            let onlineCount = 0;        
            let errorCount = 0;        

            const botList = Object.entries(allBotsData).map(([key, value]) => ({...value, _key: key}));
            
            // Hesap adına göre sırala
            botList.sort((a, b) => a.Account.localeCompare(b.Account, undefined, {numeric: true, sensitivity: 'base'}));

            botList.forEach(bot => {
                const lastUpd = parseCustomDate(bot.LastUpdate || "01.01.2000 00:00:00");
                const diffMinutes = (new Date() - lastUpd) / 1000 / 60;
                
                let isDead = false;
                let displayColor = colorMap[bot.ColorCode] || colorMap["gray"];
                let displayStatus = bot.StatusMsg || "Veri Bekleniyor...";
                let statusCode = bot.StatusCode || "WAITING";

                // VDS botu 4 dakikadan uzun süre veri atmazsa ölü (Offline) say
                if (diffMinutes > 4 && bot.LastUpdate) {
                    isDead = true;
                    displayColor = colorMap["gray"];
                    displayStatus = "BAĞLANTI KOPTU (Gözcü Kapalı)";
                    statusCode = "OFFLINE";
                } else if (bot.LastUpdate) {
                    if (bot.ColorCode === "green") onlineCount++;
                    if (["red", "purple", "black"].includes(bot.ColorCode)) errorCount++;
                }

                // Arama Filtresi
                if (searchTerm) {
                    const searchStr = `${bot.Account} ${bot.Server} ${bot.WebCharName || ''}`.toLowerCase();
                    if (!searchStr.includes(searchTerm)) return; 
                }

                // Durum Filtresi
                let botCategory = "WAITING"; 
                if (statusCode === "ONLINE") botCategory = "ONLINE";
                else if (statusCode === "OFFLINE") botCategory = "OFFLINE";
                else if (statusCode === "JAIL" || statusCode === "BLACKLIST") botCategory = "JAIL";
                else if (["OTP_ERROR", "NPC_ERROR", "TIME_ERROR", "RESTARTING", "NOT_FOUND"].includes(statusCode)) botCategory = "ERROR";

                if (filterValue !== "ALL" && botCategory !== filterValue) return;

                const icon = iconMap[statusCode] || "fa-desktop";

                // WEB SİTESİNDEN GELEN COİN VE CHAR BİLGİSİ
                const webCharName = bot.WebCharName ? bot.WebCharName : "Bekleniyor...";
                const webCoin = bot.WebCoin ? bot.WebCoin : "0";

                const card = document.createElement('div');
                card.className = "bot-card bg-slate-800 rounded-xl overflow-hidden relative border border-slate-700 flex flex-col pt-2";
                card.style.borderTopWidth = "4px";
                card.style.borderTopColor = displayColor;
                
                if(isDead) card.style.opacity = "0.6";

                card.innerHTML = `
                    <div class="p-4 flex-grow flex flex-col relative mt-1">
                        <button onclick="openCommandModal('${bot._key}', '${bot.Account}', '${bot.Server}')" class="absolute top-0 right-0 text-slate-400 hover:text-white bg-slate-700/50 hover:bg-slate-600 rounded p-2 transition-colors z-10">
                            <i class="fa-solid fa-gear"></i>
                        </button>

                        <div class="flex justify-between items-start mb-3 pr-8 mt-1">
                            <h3 class="text-xl font-bold text-white tracking-wide truncate pr-2" title="${bot.Account}">
                                <i class="fa-solid fa-user text-slate-500 text-sm mr-1"></i> ${bot.Account}
                            </h3>
                            <span class="px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap bg-slate-900 text-slate-300 border border-slate-700 shadow-inner">
                                ${bot.Server || 'SERVER YOK'}
                            </span>
                        </div>
                        
                        <!-- WEB SİTESİNDEN GELEN COİN VE CHAR BİLGİSİ -->
                        <div class="flex justify-between items-center mb-3 bg-slate-900/50 p-2 rounded border border-slate-700/50 shadow-inner">
                            <div class="text-[11px] font-bold text-purple-300 truncate pr-2" title="Karakter Adı">
                                <i class="fa-solid fa-user-ninja mr-1 opacity-70"></i>${webCharName}
                            </div>
                            <div class="text-[12px] font-extrabold text-yellow-400 whitespace-nowrap" title="Mevcut Coin">
                                <i class="fa-solid fa-coins mr-1 opacity-80"></i>${webCoin}
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-3 mt-auto bg-slate-900/30 p-2 rounded-lg border border-slate-700/30">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0 mt-0.5" style="background-color: ${displayColor}20; color: ${displayColor}">
                                <i class="fa-solid ${icon}"></i>
                            </div>
                            <p class="text-xs font-medium leading-relaxed" style="color: ${displayColor}">
                                ${displayStatus}
                            </p>
                        </div>
                    </div>
                    
                    <div class="bg-slate-900/50 px-4 py-2 text-[10px] text-slate-500 flex justify-between uppercase tracking-wider border-t border-slate-800">
                        <span class="truncate pr-2"><i class="fa-solid fa-microchip mr-1"></i> ${bot.MachineName || 'PC'}</span>
                        <span class="shrink-0"><i class="fa-regular fa-clock mr-1"></i> ${isDead && bot.LastUpdate ? Math.floor(diffMinutes) + ' DK ÖNCE' : (bot.LastUpdate ? bot.LastUpdate.split(' ')[1] : '--:--')}</span>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            document.getElementById('onlineCount').textContent = onlineCount;
            document.getElementById('errorCount').textContent = errorCount;
        }

        // ----------------------------------------------------
        // UI & MODAL KONTROLLERİ
        // ----------------------------------------------------
        
        // Ayarlar Modalı
        window.openSettingsModal = function() {
            const modal = document.getElementById('settingsModal');
            const content = document.getElementById('settingsModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        window.closeSettingsModal = function() {
            const modal = document.getElementById('settingsModal');
            const content = document.getElementById('settingsModalContent');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        window.saveSettings = function() {
            const webhookUrl = document.getElementById('discordWebhookInput').value;
            const enableAlerts = document.getElementById('enableDiscordAlerts').checked;
            
            localStorage.setItem('discordWebhookUrl', webhookUrl.trim());
            localStorage.setItem('enableDiscordAlerts', enableAlerts);
            
            closeSettingsModal();
            showToast("Ayarlar Kaydedildi", "Discord webhook ayarları güncellendi.", "success");
        }

        // Komut Modalı
        window.openCommandModal = function(botKey, account, server) {
            selectedBotIdForCommand = botKey;
            document.getElementById('cmdBotName').textContent = `${account} (${server})`;
            
            const modal = document.getElementById('commandModal');
            const content = document.getElementById('commandModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        window.closeCommandModal = function() {
            const modal = document.getElementById('commandModal');
            const content = document.getElementById('commandModalContent');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // Tekli Bot Komut Gönderme
        window.sendCommand = function(actionCode) {
            if (!selectedBotIdForCommand) return;
            
            const commandRef = ref(db, `Bots/${musteriID}/${selectedBotIdForCommand}/Command`);
            const payload = {
                action: actionCode,
                param: "",
                status: "PENDING",
                timestamp: Date.now()
            };
            
            set(commandRef, payload)
                .then(() => {
                    closeCommandModal();
                    showToast("Komut İletildi", "Bot komutu aldı, 5 saniye içinde işleyecek.", "success");
                })
                .catch((err) => {
                    showToast("Hata", "Komut gönderilemedi!", "error");
                });
        }

        // Tüm Botları Zorla Başlatma
        window.forceRestartAll = function() {
            if (!confirm("TÜM botlara 'Zorla Başlat' komutu göndermek istediğinize emin misiniz?\n(Sırada olanlar ve oyunda kasanlar yeniden başlatılmaz, sadece sorunlular kilitleri kırıp baştan başlar.)")) return;

            let successCount = 0;
            const keys = Object.keys(allBotsData);
            
            if (keys.length === 0) {
                showToast("Hata", "Aktif bot bulunamadı.", "error");
                return;
            }

            keys.forEach(botKey => {
                const commandRef = ref(db, `Bots/${musteriID}/${botKey}/Command`);
                set(commandRef, {
                    action: "START_GAME",
                    param: "",
                    status: "PENDING",
                    timestamp: Date.now()
                }).then(() => successCount++);
            });

            showToast("Toplu Komut", "Zorla başlatma emri tüm ağa iletildi.", "success");
        }

        // Toast Bildirimi Gösterme
        window.showToast = function(title, message, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastMessage').textContent = message;
            
            const icon = document.getElementById('toastIcon');
            if(type === 'success') {
                icon.className = "fa-solid fa-circle-check text-green-400 text-xl";
                toast.style.borderColor = "#4ade80";
            } else {
                icon.className = "fa-solid fa-circle-xmark text-red-400 text-xl";
                toast.style.borderColor = "#f87171";
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

    </script>
</body>
</html>
